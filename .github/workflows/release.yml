name: Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }} ${{ matrix.arch }})
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows
            runs-on: windows-2022
            target: x86_64-pc-windows-msvc
            arch: x64
            package: exe
            platform_key: windows-x86_64
          - os: windows
            runs-on: windows-2022
            target: aarch64-pc-windows-msvc
            arch: arm64
            package: exe
            platform_key: windows-aarch64
          - os: macos
            runs-on: macos-13
            target: x86_64-apple-darwin
            arch: intel
            package: dmg
            platform_key: darwin-x86_64
          - os: macos
            runs-on: macos-14
            target: aarch64-apple-darwin
            arch: arm64
            package: dmg
            platform_key: darwin-aarch64
          - os: linux
            runs-on: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            arch: x64
            package: appimage
            platform_key: linux-x86_64
          - os: linux
            runs-on: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            arch: arm64
            package: appimage
            platform_key: linux-aarch64

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: matrix.os == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev libasound2-dev libgtk-3-dev libxdo-dev pkg-config patchelf

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare Sherpa prebuilt archive
        if: matrix.target != 'aarch64-pc-windows-msvc'
        shell: bash
        run: |
          set -euo pipefail

          SHERPA_VERSION="$(node -e "const fs=require('fs'); const manifest=fs.readFileSync('src-tauri/Cargo.toml','utf8'); const match=manifest.match(/sherpa-onnx\s*=\s*\{[^}]*version\s*=\s*\"([^\"]+)\"/m); if (!match) { throw new Error('sherpa-onnx dependency version not found in src-tauri/Cargo.toml'); } console.log(match[1]);")"
          case "${{ matrix.target }}" in
            x86_64-pc-windows-msvc)
              SHERPA_ARCHIVE="sherpa-onnx-v${SHERPA_VERSION}-win-x64-static-MT-Release-lib.tar.bz2"
              ;;
            x86_64-apple-darwin)
              SHERPA_ARCHIVE="sherpa-onnx-v${SHERPA_VERSION}-osx-x64-static-lib.tar.bz2"
              ;;
            aarch64-apple-darwin)
              SHERPA_ARCHIVE="sherpa-onnx-v${SHERPA_VERSION}-osx-arm64-static-lib.tar.bz2"
              ;;
            x86_64-unknown-linux-gnu)
              SHERPA_ARCHIVE="sherpa-onnx-v${SHERPA_VERSION}-linux-x64-static-lib.tar.bz2"
              ;;
            aarch64-unknown-linux-gnu)
              SHERPA_ARCHIVE="sherpa-onnx-v${SHERPA_VERSION}-linux-aarch64-static-lib.tar.bz2"
              ;;
            *)
              echo "Unsupported Sherpa target: ${{ matrix.target }}"
              exit 1
              ;;
          esac

          SHERPA_CACHE_DIR="${{ github.workspace }}/.ci-cache/sherpa-onnx"
          SHERPA_ARCHIVE_PATH="${SHERPA_CACHE_DIR}/${SHERPA_ARCHIVE}"
          SHERPA_DOWNLOAD_URL="https://github.com/k2-fsa/sherpa-onnx/releases/download/v${SHERPA_VERSION}/${SHERPA_ARCHIVE}"

          mkdir -p "${SHERPA_CACHE_DIR}"
          curl --fail --location --retry 5 --retry-all-errors --silent --show-error \
            "${SHERPA_DOWNLOAD_URL}" \
            --output "${SHERPA_ARCHIVE_PATH}"

          echo "SHERPA_ONNX_ARCHIVE_DIR=${SHERPA_CACHE_DIR}" >> "$GITHUB_ENV"

      - name: Read app metadata
        id: meta
        shell: bash
        run: |
          VERSION=$(node -e "console.log(require('./package.json').version)")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Validate updater signing key
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "${TAURI_SIGNING_PRIVATE_KEY:-}" ]; then
            echo "TAURI_SIGNING_PRIVATE_KEY is missing"
            exit 1
          fi

          TMP_FILE="$(mktemp)"
          printf 'signer-smoke-test' > "$TMP_FILE"

          if [ -f "$TAURI_SIGNING_PRIVATE_KEY" ]; then
            pnpm tauri signer sign --private-key-path "$TAURI_SIGNING_PRIVATE_KEY" --password "${TAURI_SIGNING_PRIVATE_KEY_PASSWORD:-}" "$TMP_FILE" >/dev/null
          else
            pnpm tauri signer sign --private-key "$TAURI_SIGNING_PRIVATE_KEY" --password "${TAURI_SIGNING_PRIVATE_KEY_PASSWORD:-}" "$TMP_FILE" >/dev/null
          fi

          rm -f "$TMP_FILE" "$TMP_FILE.sig"

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SHERPA_ONNX_ARCHIVE_DIR: ${{ env.SHERPA_ONNX_ARCHIVE_DIR }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          args: --target ${{ matrix.target }}

      - name: Prepare artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          TARGET="${{ matrix.target }}"
          PLATFORM_KEY="${{ matrix.platform_key }}"
          MANUAL_ASSET=""
          UPDATER_ASSET=""
          case "${{ matrix.package }}" in
            exe)
              for file in src-tauri/target/${TARGET}/release/bundle/nsis/*.exe; do
                UPDATER_ASSET="$file"
                break
              done
              ;;
            dmg)
              for file in src-tauri/target/${TARGET}/release/bundle/dmg/*.dmg; do
                MANUAL_ASSET="$file"
                break
              done
              for file in src-tauri/target/${TARGET}/release/bundle/macos/*.app.tar.gz; do
                UPDATER_ASSET="$file"
                break
              done
              ;;
            appimage)
              for file in src-tauri/target/${TARGET}/release/bundle/appimage/*.AppImage; do
                UPDATER_ASSET="$file"
                break
              done
              ;;
            *)
              echo "Unknown package type"
              exit 1
              ;;
          esac

          if [ -n "$MANUAL_ASSET" ]; then
            cp "$MANUAL_ASSET" "dist/$(basename "$MANUAL_ASSET")"
          fi

          if [ -z "$UPDATER_ASSET" ]; then
            echo "Updater asset not found for ${TARGET}"
            exit 1
          fi

          SIG_ASSET="${UPDATER_ASSET}.sig"
          if [ ! -f "$SIG_ASSET" ]; then
            echo "Signature not found for ${UPDATER_ASSET}"
            exit 1
          fi

          cp "$UPDATER_ASSET" "dist/$(basename "$UPDATER_ASSET")"
          cp "$SIG_ASSET" "dist/$(basename "$SIG_ASSET")"

          node -e "const fs=require('fs'); fs.writeFileSync('dist/updater-${PLATFORM_KEY}.json', JSON.stringify({ platform: '${PLATFORM_KEY}', updaterAsset: '${UPDATER_ASSET##*/}', signatureAsset: '${SIG_ASSET##*/}' }, null, 2));"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bundle-${{ matrix.os }}-${{ matrix.arch }}
          path: dist/*
          if-no-files-found: error

  release:
    name: Create Release
    needs: build
    if: ${{ !cancelled() && !failure() }}
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Read app metadata
        id: meta
        shell: bash
        run: |
          VERSION=$(node -e "console.log(require('./package.json').version)")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Generate release notes
        id: notes
        shell: bash
        run: |
          set -euo pipefail
          git fetch --tags --force
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -n "$LAST_TAG" ]; then
            RANGE="$LAST_TAG..HEAD"
          else
            RANGE=""
          fi
          if [ -n "$RANGE" ]; then
            NOTES=$(git log --pretty=format:"- %s" "$RANGE")
          else
            NOTES=$(git log --max-count=50 --pretty=format:"- %s")
          fi
          if [ -z "$NOTES" ]; then
            NOTES="- (no commits found)"
          fi
          echo "body<<EOF" >> "$GITHUB_OUTPUT"
          echo "$NOTES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Generate latest.json
        shell: bash
        env:
          VERSION: ${{ steps.meta.outputs.version }}
          RELEASE_NOTES: ${{ steps.notes.outputs.body }}
          REPOSITORY: youtonghy/VTT-keyboard
        run: |
          node <<'NODE'
          const fs = require('fs');
          const path = require('path');

          const assetsDir = path.join(process.cwd(), 'release-assets');
          const version = process.env.VERSION;
          const releaseNotes = process.env.RELEASE_NOTES || '';
          const repository = process.env.REPOSITORY;
          const metadataFiles = fs.readdirSync(assetsDir).filter((name) => /^updater-.*\.json$/.test(name));
          const platforms = {};

          for (const metadataFile of metadataFiles) {
            const metadataPath = path.join(assetsDir, metadataFile);
            const metadata = JSON.parse(fs.readFileSync(metadataPath, 'utf8'));
            const signature = fs.readFileSync(path.join(assetsDir, metadata.signatureAsset), 'utf8').trim();
            platforms[metadata.platform] = {
              signature,
              url: `https://github.com/${repository}/releases/download/${version}/${metadata.updaterAsset}`,
            };
            fs.unlinkSync(metadataPath);
          }

          fs.writeFileSync(
            path.join(assetsDir, 'latest.json'),
            JSON.stringify(
              {
                version,
                notes: releaseNotes,
                pub_date: new Date().toISOString(),
                platforms,
              },
              null,
              2,
            ),
          );
          NODE

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.meta.outputs.version }}
          name: ${{ steps.meta.outputs.version }}
          body: ${{ steps.notes.outputs.body }}
          files: release-assets/*
